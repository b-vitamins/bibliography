[defaults]
overwrite_existing = false
min_abstract_words = 25
allow_abstract_prefix_match = false
report_dir = "ops/enrichment-runs"
triage_dir = "ops/unresolved/enrichment"
source_cache_path = "ops/enrichment-source-cache.json"
exceptions_path = "ops/enrichment-exceptions.toml"
timeout_seconds = 20
max_retries = 2
max_validation_retries = 4
host_min_interval_seconds = 1.0
host_min_interval_by_host = { "export.arxiv.org" = 3.0, "api.openalex.org" = 0.1, "openreview.net" = 0.5, "api.openreview.net" = 1.1, "api2.openreview.net" = 1.1, "proceedings.neurips.cc" = 0.2, "proceedings.mlr.press" = 0.2 }
host_circuit_breaker_threshold = 0
host_circuit_breaker_cooldown_seconds = 0.0
backoff_base_seconds = 1.0
backoff_max_seconds = 30.0
user_agent = "bibliography-enrichment-pipeline/1.0"
checkpoint_dir = "ops/enrichment-checkpoints"
checkpoint_flush_every = 20

[targets]
inproceedings = ["url", "pdf", "abstract"]

[policy]
protected_fields = ["author", "title", "booktitle", "year"]

[[venues]]
name = "iclr"
path_contains = "conferences/iclr/"
adapter = "openreview"
allowed_domains = ["openreview.net"]

[[venues]]
name = "neurips"
path_contains = "conferences/neurips/"
adapter = "neurips_proceedings"
allowed_domains = ["proceedings.neurips.cc", "neurips.cc", "papers.nips.cc"]

[[venues]]
name = "icml"
path_contains = "conferences/icml/"
adapter = "pmlr"
allowed_domains = ["proceedings.mlr.press", "raw.githubusercontent.com", "icml.cc", "www.icml.cc", "doi.org", "dx.doi.org", "wikidata.org", "www.wikidata.org", "aaai.org", "www.aaai.org", "orkg.org"]
